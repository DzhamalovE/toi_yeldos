<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тойға шақыру | Елдос & Дурия</title>
    <style>
        body {
            margin: 0;
            font-family: 'Georgia', serif;
            background: linear-gradient(to right, #f8e1e7, #e1f0f8);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 450px;
            max-width: 100%;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #b76e79;
            font-size: 24px;
            margin-bottom: 10px;
        }
        h2 {
            margin-top: 10px;
            color: #333;
            font-size: 28px;
        }
        .invite-text {
            font-size: 16px;
            margin: 15px 0;
            color: #555;
            line-height: 1.5;
        }
        .details {
            text-align: left;
            background: #fef6f7;
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
        }
        .details p {
            margin: 10px 0;
            color: #444;
            font-size: 16px;
        }
        .details strong {
            color: #b76e79;
        }
        .hosts {
            text-align: center;
            background: #fff0f0;
            padding: 10px;
            border-radius: 12px;
            margin: 15px 0;
            font-size: 14px;
            color: #b76e79;
        }
        .map-container {
            margin: 15px 0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .map-container iframe {
            width: 100%;
            height: 250px;
            border: none;
        }
        .map-button {
            display: inline-block;
            margin-top: 8px;
            padding: 8px 16px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-size: 14px;
            transition: background 0.3s;
        }
        .map-button:hover {
            background: #45a049;
        }
        .form-group {
            text-align: left;
            margin: 15px 0;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #b76e79;
            font-weight: bold;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #e0c8cc;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            box-sizing: border-box;
        }
        button {
            margin-top: 10px;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            background: #b76e79;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            width: 100%;
        }
        button:hover {
            background: #a05560;
            transform: scale(1.02);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        #response {
            margin-top: 15px;
            font-size: 14px;
            font-weight: bold;
            padding: 10px;
            border-radius: 10px;
        }
        .response-success {
            background: #d4edda;
            color: #155724;
        }
        .response-error {
            background: #f8d7da;
            color: #721c24;
        }
        .ornament {
            font-size: 24px;
            color: #d49ea8;
            margin: 10px 0 5px;
        }
        .bride-groom {
            font-size: 26px;
            font-weight: bold;
            color: #b76e79;
            margin: 15px 0;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="ornament">🌸 🤍 🌸</div>
    
    <h1>Құрметті қонақ!</h1>
    
    <div class="invite-text">
        Сізді біздің қуанышымызбен бөлісуге арналған<br>
        <strong> үйлену тойымызға</strong> шақырамыз!
    </div>
    
    <div class="bride-groom">
        🤵 Елдос & Дурия 👰
    </div>
    
    <div class="details">
        <p><strong>📅 Күні:</strong> 20.06.2026ж</p>
        <p><strong>⏰ Уақыты:</strong> 20:00</p>
        <p><strong>📍 Мекенжай:</strong> Бостандық ауданы, Абай ауылы, "Демеу тойханасы"</p>
    </div>

    <div class="hosts">
        🏠 Той иелері: <strong>Данияр & Феруза</strong>
    </div>

    <!-- Google Maps картасы (Абай ауылы, Бостандық ауданы) -->
    <div class="map-container">
        <iframe 
            src="https://www.google.com/maps/place/%D0%9A%D0%B0%D1%80%D0%B0%D0%B1%D0%B0%D0%B9,+%D0%A2%D0%B0%D1%88%D0%BA%D0%B5%D0%BD%D1%82%D1%81%D0%BA%D0%B0%D1%8F+%D0%BE%D0%B1%D0%BB%D0%B0%D1%81%D1%82%D1%8C,+%D0%A3%D0%B7%D0%B1%D0%B5%D0%BA%D0%B8%D1%81%D1%82%D0%B0%D0%BD/@41.4582165,69.6084899,6774m/data=!3m2!1e3!4b1!4m6!3m5!1s0x38aefcef790eb1a7:0x3b9f9f5749a9de14!8m2!3d41.4518401!4d69.6065612!16s%2Fg%2F1hhnprwzb?authuser=0&entry=ttu&g_ep=EgoyMDI2MDQyNi4wIKXMDSoASAFQAw%3D%3D"
            allowfullscreen="" 
            loading="lazy">
        </iframe>
    </div>
    <a href="https://www.google.com/maps/place/Kafe+%22Demeu+beshbarmoq%22/@41.4544446,69.6067912,3376m/data=!3m1!1e3!4m6!3m5!1s0x38aefd504c264f81:0xd9789c9a51ff7e84!8m2!3d41.4563153!4d69.6097478!16s%2Fg%2F11rnfymhgf?authuser=0&entry=ttu&g_ep=EgoyMDI2MDQyNi4wIKXMDSoASAFQAw%3D%3D" target="_blank" class="map-button">
        🗺️ Картадан ашу
    </a>

    <div class="form-group">
        <label>👤 Аты-жөніңіз *</label>
        <input type="text" id="guestName" placeholder="Мысалы: Асан Асанов" required>
    </div>

    <div class="form-group">
        <label>📞 Телефон нөмірі *</label>
        <input type="tel" id="guestPhone" placeholder="Мысалы: +7 777 123 4567" required>
    </div>

    <div class="form-group">
        <label>👥 Бірге келетіндер саны</label>
        <input type="number" id="guestCount" placeholder="1" value="1" min="1" max="10">
    </div>
    
    <button onclick="sendToTelegram()">✅ Тойға келетінімді растаймын</button>
    
    <div id="response"></div>
    
    <div class="ornament">✨ 💕 ✨</div>
</div>

<script>
    // ✅ СІЗДІҢ БОТ ТОКЕНІҢІЗ
    const BOT_TOKEN = '8442580206:AAHmjNXrPKr5yN5SyMyaB-nLWXWiq1smbfk';
    
    // ✅ ХАБАРЛАМА КЕЛУІ КЕРЕКТІН БАРЛЫҚ АДАМНЫҢ CHAT ID
    const CHAT_IDS = [
        '7489755304',   // Сіздің ID (Алтел Билайн)
        // Басқа ID-ларды осыған қосыңыз
    ];

    async function sendToTelegram() {
        const name = document.getElementById('guestName').value.trim();
        const phone = document.getElementById('guestPhone').value.trim();
        const count = document.getElementById('guestCount').value;

        if (!name || !phone) {
            showResponse('❗ Аты-жөніңіз бен телефон нөміріңізді толтырыңыз!', 'error');
            return;
        }

        const btn = event.target;
        btn.disabled = true;
        btn.textContent = '⏰ Жіберілуде...';

        const message = `🎉 ТОЙҒА ҚАТЫСУШЫ 🎉
━━━━━━━━━━━━━━━━━━━
👰🤵 Жастар: Елдос & Дурия
👤 Қонақ: ${name}
📞 Телефон: ${phone}
👥 Бірге келетіндер: ${count} адам
━━━━━━━━━━━━━━━━━━━
📅 Күні: 20 Маусым 2026, 20:00
📍 Мекенжай: Бостандық ауданы, Абай ауылы, "Демеу тойханасы"
🏠 Той иелері: Данияр & Феруза
━━━━━━━━━━━━━━━━━━━
✅ ҚАТЫСАДЫ`;

        let successCount = 0;

        for (const chatId of CHAT_IDS) {
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });

                const data = await response.json();
                if (data.ok) {
                    successCount++;
                } else {
                    console.error(`Chat ID ${chatId} қатесі:`, data);
                }
            } catch (error) {
                console.error(`Chat ID ${chatId} жіберу қатесі:`, error);
            }
        }

        if (successCount > 0) {
            showResponse(`✅ Рахмет! Сізді тойға күтеміз! 🎉`, 'success');
            document.getElementById('guestName').value = '';
            document.getElementById('guestPhone').value = '';
            document.getElementById('guestCount').value = '1';
        } else {
            showResponse('❌ Қате кетті! Кейінірек қайталаңыз.', 'error');
        }

        btn.disabled = false;
        btn.textContent = '✅ Тойға келетінімді растаймын';
    }

    function showResponse(message, type) {
        const responseDiv = document.getElementById('response');
        responseDiv.textContent = message;
        responseDiv.className = type === 'success' ? 'response-success' : 'response-error';
        
        setTimeout(() => {
            responseDiv.textContent = '';
            responseDiv.className = '';
        }, 5000);
    }

    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendToTelegram();
            }
        });
    });
</script>
</body>
</html>
