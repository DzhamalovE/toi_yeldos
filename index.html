<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тойға шақыру | Елдос & ------</title>
    <style>
        body {
            margin: 0;
            font-family: 'Georgia', serif;
            background: linear-gradient(to right, #f8e1e7, #e1f0f8);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 400px;
            max-width: 100%;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #b76e79;
            font-size: 24px;
            margin-bottom: 10px;
        }

        h2 {
            margin-top: 10px;
            color: #333;
            font-size: 20px;
        }

        .invite-text {
            font-size: 16px;
            margin: 15px 0;
            color: #555;
            line-height: 1.5;
        }

        .details {
            text-align: left;
            background: #fef6f7;
            padding: 12px;
            border-radius: 12px;
            margin: 15px 0;
        }

        .details p {
            margin: 8px 0;
            color: #444;
            font-size: 14px;
        }

        .details strong {
            color: #b76e79;
        }

        .form-group {
            text-align: left;
            margin: 15px 0;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #b76e79;
            font-weight: bold;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #e0c8cc;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #b76e79;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #b76e79;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            width: 100%;
        }

        button:hover {
            background: #a05560;
            transform: scale(1.02);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        #response {
            margin-top: 15px;
            font-size: 14px;
            font-weight: bold;
            padding: 10px;
            border-radius: 10px;
            min-height: 40px;
        }

        .response-success {
            background: #d4edda;
            color: #155724;
        }

        .response-error {
            background: #f8d7da;
            color: #721c24;
        }

        .ornament {
            font-size: 24px;
            color: #d49ea8;
            margin: 10px 0 5px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="ornament">🌸 🤍 🌸</div>
    
    <h1>Құрметті қонақ(тар)!</h1>
    
    <div class="invite-text">
        Сізді біздің қуанышымызбен бөлісуге арналған<br>
        <strong>тойымызға</strong> шақырамыз!
    </div>
    
    <h2>🤵 Елдос & 👰 -------</h2>
    
    <div class="details">
        <p><strong>📅 Күні:</strong> 20 Маусым 2026</p>
        <p><strong>⏰ Уақыты:</strong> 20:00</p>
        <p><strong>📍 Мекенжай:</strong> Газалкент қаласы, "Royal Hall"</p>
    </div>

    <div class="form-group">
        <label>👤 Аты-жөніңіз *</label>
        <input type="text" id="guestName" placeholder="Мысалы: Асан Асанов" required>
    </div>

    <div class="form-group">
        <label>📞 Телефон нөмірі *</label>
        <input type="tel" id="guestPhone" placeholder="Мысалы: +7 777 123 4567" required>
    </div>

    <div class="form-group">
        <label>👥 Бірге келетіндер саны</label>
        <input type="number" id="guestCount" placeholder="1" value="1" min="1" max="10">
    </div>
    
    <button onclick="sendToTelegram()">✅ Тойға келетінімді растаймын</button>
    
    <div id="response"></div>
    
    <div class="ornament">✨ 💕 ✨</div>
</div>

<script>
    // ✅ СІЗДІҢ БОТ ТОКЕНІҢІЗ
    const BOT_TOKEN = '8442580206:AAHmjNXrPKr5yN5SyMyaB-nLWXWiq1smbfk';
    
    // ✅ МҰНДА ХАБАРЛАМА КЕЛУІ КЕРЕКТІН БАРЛЫҚ АДАМНЫҢ CHAT ID (үтір арқылы жазылады)
    const CHAT_IDS = [
        '7489755304',   // Сіздің ID (Алтел Билайн)
        '1712796190',  // Досыңыздың ID-сы (қосқыңыз келсе)
        '1262516460',  // Тағы бір туысыңыз
    ];

    async function sendToTelegram() {
        const name = document.getElementById('guestName').value.trim();
        const phone = document.getElementById('guestPhone').value.trim();
        const count = document.getElementById('guestCount').value;

        if (!name || !phone) {
            showResponse('❗ Аты-жөніңіз бен телефон нөміріңізді толтырыңыз!', 'error');
            return;
        }

        const phoneRegex = /^[\+\d\s\-\(\)]{10,20}$/;
        if (!phoneRegex.test(phone)) {
            showResponse('❗ Дұрыс телефон нөмірін енгізіңіз (мысалы: +77771234567)', 'error');
            return;
        }

        const btn = event.target;
        btn.disabled = true;
        btn.textContent = '⏰ Жіберілуде...';

        const message = `🎉 ТОЙҒА ҚАТЫСУШЫ 🎉
━━━━━━━━━━━━━━━━━━━
👤 Қонақ: ${name}
📞 Телефон: ${phone}
👥 Бірге келетіндер: ${count} адам
🎊 Той: Елдос & ------
📅 Күні: 20 Маусым 2026, 20:00
📍 Мекенжай: Газалкент, Royal Hall
━━━━━━━━━━━━━━━━━━━
✅ ҚАТЫСАДЫ`;

        let successCount = 0;
        let errorCount = 0;

        // Барлық адамға хабарлама жіберу
        for (const chatId of CHAT_IDS) {
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });

                const data = await response.json();
                if (data.ok) {
                    successCount++;
                } else {
                    errorCount++;
                    console.error(`Chat ID ${chatId} қатесі:`, data);
                }
            } catch (error) {
                errorCount++;
                console.error(`Chat ID ${chatId} жіберу қатесі:`, error);
            }
        }

        if (successCount > 0) {
            showResponse(`✅ Рахмет! Сізді тойға күтеміз! 🎉`, 'success');
            document.getElementById('guestName').value = '';
            document.getElementById('guestPhone').value = '';
            document.getElementById('guestCount').value = '1';
        } else {
            showResponse('❌ Қате кетті! Кейінірек қайталаңыз.', 'error');
        }

        btn.disabled = false;
        btn.textContent = '✅ Тойға келетінімді растаймын';
    }

    function showResponse(message, type) {
        const responseDiv = document.getElementById('response');
        responseDiv.textContent = message;
        responseDiv.className = type === 'success' ? 'response-success' : 'response-error';
        
        setTimeout(() => {
            responseDiv.textContent = '';
            responseDiv.className = '';
        }, 5000);
    }

    // Enter батырмасымен жіберу
    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendToTelegram();
            }
        });
    });
</script>

</body>
</html>
